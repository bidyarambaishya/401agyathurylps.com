<!DOCTYPE html>
<html>
<head>
<title>Student Admission Form</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}
.container{
    max-width:800px;
    background:white;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
h2{
    text-align:center;
    color:#0d6efd;
    margin-bottom:30px;
}
label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}
input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}
.row{
    display:flex;
    gap:15px;
}
.row div{
    flex:1;
}
button{
    margin-top:20px;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}
button:hover{
    background:#084298;
}
</style>
</head>

<body>

<div class="container">

<h2>🎓 Student Admission Form</h2>

<form action="https://script.google.com/macros/s/AKfycbyBMaFqA7DwpaHV-F4gQqXPV7Bt0YEot1tOWrAQingPuE8jNJWQblNqEHmTo2ONah3dDQ/exec">

<label>Student Full Name</label>
<input type="text" name="name" required>

<div class="row">
<div>
<label>Date of Birth</label>
<input type="date" name="dob" required>
</div>

<div>
<label>Gender</label>
<select name="gender" required>
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>
</div>

<label>Class Applying For</label>
<select name="class" required>
<option value="">Select Class</option>
<option>Class KA</option>
<option>Class I</option>
<option>Class II</option>
<option>Class III</option>
<option>Class IV</option>
<option>Class V</option>
</select>

<label>Father's Name</label>
<input type="text" name="father" required>

<label>Mother's Name</label>
<input type="text" name="mother" required>

<label>Guardian Contact Number</label>
<input type="tel" name="phone" required>

<label>Address</label>
<textarea name="address" rows="3" required></textarea>

<button type="submit">Submit Application</button>

</form>

</div>

</body>
</html>
